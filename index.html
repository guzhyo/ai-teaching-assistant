<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>AI 助教空间 · 小统</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script>
// KaTeX with timeout fallback
window._katexReady = false;
</script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" onload="window._katexReady=true"></script>
<script>
setTimeout(function(){
  if(!window._katexReady && typeof katex === 'undefined'){
    // Try alternate CDN
    var s=document.createElement('script');
    s.src='https://unpkg.com/katex@0.16.9/dist/katex.min.js';
    s.onload=function(){window._katexReady=true};
    document.head.appendChild(s);
  }
},3000);
</script>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a28;
  --primary: #6c5ce7;
  --primary-glow: #a29bfe;
  --accent: #00d2ff;
  --accent2: #ff6b9d;
  --gold: #ffd700;
  --text: #e8e8f0;
  --text2: #9898b0;
  --danger: #ff4757;
  --success: #2ed573;
  --radius: 16px;
  --radius-sm: 10px;
  --font: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { 
  width: 100%; height: 100%; 
  overflow: hidden;
  background: var(--bg);
  font-family: var(--font);
  color: var(--text);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* === Canvas Background === */
#bg-canvas {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
}

/* === Main Container === */
#app {
  position: relative; z-index: 1;
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}

/* === Top Bar === */
.top-bar {
  padding: 20px 20px 10px;
  display: flex; align-items: center; gap: 12px;
  flex-shrink: 0;
}
.avatar-ring {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  box-shadow: 0 0 20px rgba(108,92,231,0.4);
  animation: avatarPulse 3s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes avatarPulse {
  0%, 100% { box-shadow: 0 0 20px rgba(108,92,231,0.4); }
  50% { box-shadow: 0 0 40px rgba(0,210,255,0.6); }
}
.top-info h1 { font-size: 20px; font-weight: 700; }
.top-info p { font-size: 12px; color: var(--text2); }

/* === Hero Section === */
.hero {
  text-align: center; padding: 10px 20px 20px;
  flex-shrink: 0;
}
.hero-badge {
  display: inline-block;
  padding: 6px 16px;
  border-radius: 20px;
  background: rgba(108,92,231,0.15);
  border: 1px solid rgba(108,92,231,0.3);
  font-size: 12px; color: var(--primary-glow);
  margin-bottom: 12px;
}
.hero h2 {
  font-size: 26px; font-weight: 800;
  background: linear-gradient(135deg, #fff, var(--primary-glow));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 6px;
}
.hero .subtitle {
  font-size: 13px; color: var(--text2);
}

/* === Main Menu - Three Cards === */
.menu {
  display: flex; flex-direction: column; gap: 14px;
  padding: 0 20px 30px;
  flex-shrink: 0;
}
.menu-card {
  position: relative;
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius);
  padding: 22px 20px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  overflow: hidden;
  display: flex; align-items: center; gap: 16px;
}
.menu-card:active {
  transform: scale(0.97);
}
.menu-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  border-radius: 2px 2px 0 0;
}
.menu-card.card1::before { background: linear-gradient(90deg, var(--accent), var(--primary)); }
.menu-card.card2::before { background: linear-gradient(90deg, var(--accent2), #ffa502); }
.menu-card.card3::before { background: linear-gradient(90deg, var(--success), var(--accent)); }
.menu-card .card-icon {
  width: 52px; height: 52px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; flex-shrink: 0;
}
.card1 .card-icon { background: rgba(0,210,255,0.1); }
.card2 .card-icon { background: rgba(255,107,157,0.1); }
.card3 .card-icon { background: rgba(46,213,115,0.1); }
.menu-card .card-body h3 { 
  font-size: 17px; font-weight: 700; margin-bottom: 4px;
}
.menu-card .card-body p {
  font-size: 12px; color: var(--text2); line-height: 1.4;
}

/* === Panel (Modal) === */
.panel-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.85);
  z-index: 100;
  display: flex; align-items: flex-end;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.panel {
  width: 100%; max-height: 85vh;
  background: var(--surface);
  border-radius: 24px 24px 0 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.panel-header {
  position: sticky; top: 0; z-index: 10;
  background: var(--surface);
  padding: 20px 20px 10px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.panel-header h3 { font-size: 18px; font-weight: 700; }
.panel-close {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.06); border: none; color: var(--text2);
  font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.panel-body { padding: 20px; }

/* === Case Cards === */
.company-card {
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 18px;
  margin-bottom: 14px;
  border-left: 3px solid var(--accent);
}
.company-card h4 { 
  font-size: 16px; font-weight: 700; margin-bottom: 10px;
  color: var(--accent);
}
.company-card .data-row {
  display: flex; justify-content: space-between;
  padding: 6px 0; font-size: 13px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.company-card .data-row:last-child { border: none; }
.company-card .data-row .label { color: var(--text2); }
.company-card .data-row .value { font-weight: 600; }

/* === Knowledge Section === */
.knowledge-block {
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 18px;
  margin-bottom: 14px;
}
.knowledge-block h4 {
  font-size: 15px; font-weight: 700; margin-bottom: 8px;
  color: var(--accent2);
}
.knowledge-block p {
  font-size: 13px; line-height: 1.7; color: var(--text2);
}

/* === Quiz Section === */
.quiz-card {
  background: linear-gradient(135deg, var(--surface2), rgba(108,92,231,0.08));
  border: 1px solid rgba(108,92,231,0.2);
  border-radius: var(--radius);
  padding: 22px;
  margin: 20px 0;
  position: relative;
  overflow: hidden;
}
.quiz-card::after {
  content: '🎯';
  position: absolute; top: 12px; right: 16px;
  font-size: 24px; opacity: 0.3;
}
.quiz-card .q-title {
  font-size: 13px; color: var(--primary-glow); margin-bottom: 12px;
  font-weight: 600;
}
.quiz-card .q-text {
  font-size: 16px; font-weight: 600; margin-bottom: 16px; line-height: 1.5;
}
.quiz-options { display: flex; flex-direction: column; gap: 8px; }
.quiz-option {
  padding: 14px 16px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-sm);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  color: var(--text);
}
.quiz-option:active { background: rgba(108,92,231,0.15); }
.quiz-option.correct {
  background: rgba(46,213,115,0.15) !important;
  border-color: var(--success) !important;
  animation: correctFlash 0.6s ease;
}
.quiz-option.wrong {
  background: rgba(255,71,87,0.15) !important;
  border-color: var(--danger) !important;
  animation: shake 0.5s ease;
}
@keyframes correctFlash {
  0%, 100% { box-shadow: 0 0 0 rgba(46,213,115,0); }
  50% { box-shadow: 0 0 30px rgba(46,213,115,0.5); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
}
.quiz-feedback {
  margin-top: 14px; padding: 14px; border-radius: var(--radius-sm);
  font-size: 14px; text-align: center;
  display: none;
  animation: fadeIn 0.4s ease;
}
.quiz-feedback.show { display: block; }
.quiz-feedback.correct-fb { background: rgba(46,213,115,0.1); color: var(--success); }
.quiz-feedback.wrong-fb { background: rgba(255,71,87,0.1); color: var(--danger); }

/* === Shake Screen Effect === */
.screen-shake {
  animation: screenShake 0.6s ease;
}
@keyframes screenShake {
  0%, 100% { transform: translate(0, 0); }
  10% { transform: translate(-4px, 2px); }
  20% { transform: translate(4px, -2px); }
  30% { transform: translate(-3px, -1px); }
  40% { transform: translate(3px, 1px); }
  50% { transform: translate(-2px, -1px); }
  60% { transform: translate(2px, 1px); }
  70% { transform: translate(-1px, 0); }
  80% { transform: translate(1px, 0); }
  90% { transform: translate(0, 0); }
}

/* === Task Section === */
.task-item {
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 16px;
  margin-bottom: 12px;
  display: flex; align-items: flex-start; gap: 12px;
  border-left: 3px solid var(--success);
}
.task-num {
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(46,213,115,0.15);
  color: var(--success);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
  flex-shrink: 0;
}
.task-item p { font-size: 13px; line-height: 1.6; }

/* === Floating Assistant === */
.float-assistant {
  position: fixed; bottom: 20px; right: 20px;
  width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  box-shadow: 0 4px 24px rgba(108,92,231,0.5);
  z-index: 50; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  animation: floatBounce 2s ease-in-out infinite;
  transition: transform 0.2s;
}
.float-assistant:active { transform: scale(0.9); }
@keyframes floatBounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

/* === Chat Float Button === */
.float-chat {
  position: fixed; bottom: 20px; left: 20px;
  width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent2), #ffa502);
  box-shadow: 0 4px 24px rgba(255,107,157,0.5);
  z-index: 50; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  animation: floatBounce 2.5s ease-in-out infinite;
  transition: transform 0.2s;
}
.float-chat:active { transform: scale(0.9); }

/* === Chat Panel === */
.chat-panel {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 65vh; max-height: 500px;
  background: var(--surface);
  border-radius: 24px 24px 0 0;
  z-index: 150;
  display: flex; flex-direction: column;
  animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 -8px 40px rgba(0,0,0,0.5);
}
.chat-header {
  padding: 14px 20px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
}
.chat-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.chat-header-info h4 { font-size: 15px; font-weight: 700; }
.chat-header-info span { font-size: 11px; color: var(--success); }
.chat-close {
  margin-left: auto; width: 30px; height: 30px; border-radius: 50%;
  background: rgba(255,255,255,0.06); border: none; color: var(--text2);
  font-size: 16px; cursor: pointer;
}
.chat-messages {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 12px;
}
.chat-msg {
  max-width: 85%; padding: 12px 16px; border-radius: 18px;
  font-size: 13px; line-height: 1.6; word-break: break-word;
  animation: msgIn 0.3s ease;
}
@keyframes msgIn { from { opacity: 0; transform: translateY(8px); } }
.chat-msg.bot {
  align-self: flex-start;
  background: var(--surface2);
  border-bottom-left-radius: 6px;
  color: var(--text);
}
.chat-msg.user {
  align-self: flex-end;
  background: linear-gradient(135deg, var(--primary), #8b7cf0);
  border-bottom-right-radius: 6px;
  color: #fff;
}
.chat-typing {
  align-self: flex-start; padding: 10px 16px;
  display: flex; gap: 4px;
}
.chat-typing span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text2);
  animation: typingDot 1.4s ease-in-out infinite;
}
.chat-typing span:nth-child(2) { animation-delay: 0.2s; }
.chat-typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingDot {
  0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
  30% { opacity: 1; transform: translateY(-4px); }
}
.chat-input-area {
  padding: 12px 16px; display: flex; gap: 10px;
  border-top: 1px solid rgba(255,255,255,0.06); flex-shrink: 0;
}
.chat-input-area input {
  flex: 1; padding: 12px 16px; border-radius: 20px;
  background: var(--surface2); border: 1px solid rgba(255,255,255,0.08);
  color: var(--text); font-size: 14px; outline: none;
  font-family: var(--font);
}
.chat-input-area input::placeholder { color: var(--text2); }
.chat-send {
  width: 42px; height: 42px; border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--accent2));
  border: none; color: #fff; font-size: 18px; cursor: pointer;
  flex-shrink: 0; transition: transform 0.2s;
}
.chat-send:active { transform: scale(0.9); }
/* === Markdown in chat === */
.chat-msg.bot p { margin: 4px 0; }
.chat-msg.bot ul, .chat-msg.bot ol { margin: 4px 0; padding-left: 18px; }
.chat-msg.bot li { margin: 2px 0; }
.chat-msg.bot code { background: rgba(255,255,255,0.08); padding: 1px 5px; border-radius: 4px; font-size: 12px; }
.chat-msg.bot pre { background: rgba(0,0,0,0.3); padding: 8px 12px; border-radius: 8px; overflow-x: auto; margin: 6px 0; }
.chat-msg.bot pre code { background: none; padding: 0; }
.chat-msg.bot strong { color: var(--accent); }
.chat-msg.bot em { color: var(--primary-glow); font-style: italic; }
.chat-msg.bot blockquote { border-left: 2px solid var(--primary); padding-left: 10px; margin: 6px 0; color: var(--text2); }
.chat-msg.bot .katex-display { margin: 8px 0; overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch; }
.chat-msg.bot .katex { font-size: 1.05em; max-width: 100%; }

/* === Speak button on messages === */
.msg-speak-btn {
  display: inline-block; margin-left: 6px; padding: 2px 6px;
  border-radius: 10px; background: rgba(255,255,255,0.08);
  font-size: 11px; cursor: pointer; vertical-align: middle;
  opacity: 0.5; transition: opacity 0.2s;
  user-select: none; -webkit-user-select: none;
}
.msg-speak-btn:hover, .msg-speak-btn:active { opacity: 1; background: rgba(108,92,231,0.2); }

/* === Toast === */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: var(--surface2); color: var(--text);
  padding: 12px 24px; border-radius: 24px;
  font-size: 14px; z-index: 200;
  border: 1px solid rgba(255,255,255,0.1);
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2s forwards;
  pointer-events: none;
}
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } }
@keyframes toastOut { to { opacity: 0; transform: translateX(-50%) translateY(-20px); } }

/* === QR Modal === */
.qr-modal {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.9);
  z-index: 300;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  gap: 20px;
}
.qr-modal .qr-box {
  background: #fff; padding: 24px; border-radius: 20px;
  box-shadow: 0 0 60px rgba(108,92,231,0.3);
}
.qr-modal p {
  color: var(--text); font-size: 14px; text-align: center;
}
.qr-modal .qr-close {
  padding: 10px 30px; border-radius: 20px;
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
  color: var(--text); font-size: 14px; cursor: pointer;
}

/* === Call Animation === */
.call-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.92);
  z-index: 250;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 20px;
}
.call-avatar {
  width: 80px; height: 80px; border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 42px;
  animation: callPulse 1s ease-in-out infinite;
}
@keyframes callPulse {
  0%, 100% { box-shadow: 0 0 0 rgba(108,92,231,0); transform: scale(1); }
  50% { box-shadow: 0 0 40px rgba(255,107,157,0.6); transform: scale(1.08); }
}
.call-text { font-size: 20px; font-weight: 700; }
.call-sub { font-size: 13px; color: var(--text2); }

/* === Responsive === */
@media (min-width: 768px) {
  #app { max-width: 500px; margin: 0 auto; }
  .panel { max-width: 500px; margin: 0 auto; border-radius: 24px; }
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div id="app">

// ==================== STARFIELD BACKGROUND ====================
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let stars = [];
let particles = [];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Create stars
for (let i = 0; i < 120; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.5 + 0.5,
    v: Math.random() * 0.3 + 0.1,
    twinkle: Math.random() * Math.PI * 2
  });
}

// Create floating particles
for (let i = 0; i < 30; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2 + 0.5,
    vx: (Math.random() - 0.5) * 0.4,
    vy: (Math.random() - 0.5) * 0.4 - 0.2,
    opacity: Math.random() * 0.5 + 0.1
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Draw stars
  stars.forEach(s => {
    s.twinkle += 0.02;
    const alpha = 0.3 + Math.sin(s.twinkle) * 0.3;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fill();
  });

  // Draw particles
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    if (p.x < 0) p.x = canvas.width;
    if (p.x > canvas.width) p.x = 0;
    if (p.y < 0) p.y = canvas.height;
    if (p.y > canvas.height) p.y = 0;
    
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(108,92,231,${p.opacity})`;
    ctx.fill();
  });

  // Draw connection lines
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 120) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(108,92,231,${0.08 * (1 - dist/120)})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }

  requestAnimationFrame(animate);
}
animate();

function bindQuizListeners() {

      const q = quizQuestions[qi];
      const isCorrect = oi === q.answer;
      
      // Highlight selected
      this.classList.add(isCorrect ? 'correct' : 'wrong');
      
      // Highlight correct answer if wrong
      if (!isCorrect) {
        const correctBtn = document.querySelector(`#quiz-options-${qi} .quiz-option:nth-child(${q.answer + 1})`);

function speakCute(text, extraCute) {
  if (!isVoiceOn() || !text) return;
  
  if (_ttsAbort) { _ttsAbort.abort(); _ttsAbort = null; }
  speechSynthesis.cancel();
  
  var t = text.replace(/[*#_\[\]`~>\\n\\\\•🏢🏆💡📝📌📋⚙●🔇🔊🔗💬📊🧠🎯🪣]+/g, '').replace(/！/g,'～').trim();
  if (!t || t.length < 2) return;
  
  // Split into sentences for natural pauses
  var sentences = t.split(/[。！？；，、]/).filter(function(s) { return s.trim(); });
  if (!sentences.length) sentences = [t];
  
  sentences.forEach(function(s, i) {
    var msg = new SpeechSynthesisUtterance(s.trim());
    msg.lang = 'zh-CN';
    msg.rate = extraCute ? 0.85 : 0.95;
    msg.pitch = extraCute ? 1.6 : 1.35;
    msg.volume = 1;
    if (_bestVoice) msg.voice = _bestVoice;
    speechSynthesis.speak(msg);
  });
}

function findReply(query) {

  for (const faq of FAQ) {
    let score = 0;
    for (const key of faq.keys) {
      if (q.includes(key.toLowerCase())) score += key.length;
    }
    if (score > bestScore) { bestScore = score; best = faq; }
  }
  if (bestScore > 0) return best.reply;
  return null; // no FAQ match → fall back to generic
}

const SYSTEM_PROMPT = `你是"小统"，《统计学原理》课程的AI助教，授课对象是财务管理专业大二学生。

【你的知识库——仅限以下内容】

一、时间数列基础
时间数列是将某一指标在不同时间上的数值按时间先后顺序排列形成的数列。绝对数时间数列分为：
1. 时期数列：反映现象在一段时期内发展过程的总量。特点：①各指标值可相加 ②数值大小与时间间隔长短直接相关 ③通常需要连续统计。如国内生产总值、产量。
2. 时点数列：反映现象在某一时刻（瞬间）所达到的水平。特点：①各指标值通常不能纵向相加 ②数值大小与时间间隔长短没有直接关系 ③一般间隔一段时间登记一次。如年末总人口、库存量、外汇储备。相邻时点间的距离称为"间隔"。

二、序时平均数（平均发展水平）
序时平均数是将时间数列各期发展水平加以平均得到的平均数，从动态上说明现象在某一段时间内发展过程的一般水平。
序时平均数(动态平均数) vs 静态平均数：①序时平均的是不同时间的数量差异，静态平均的是同一时间各单位差异；②序时从动态说明一般水平，静态从静态说明；③序时根据时间数列计算，静态根据变量数列计算。

三、时点数列序时平均数的计算（四种方法）

1. 连续时点·间隔相等（每日登记）→ 简单算术平均法
   公式：ā = Σa / n
   适用：每天都有数据记录。

2. 连续时点·间隔不等（隔日登记）→ 加权算术平均法
   公式：ā = Σ(a×f) / Σf （f为间隔长度）
   适用：变时才登记，间隔<1个月。假设：没登记时数据不变。

3. 间断时点·间隔相等 → 首尾折半法
   公式：$$\\bar{a} = \\frac{ \\frac{a_1}{2} + \\sum_{i=2}^{n-1} a_i + \\frac{a_n}{2} }{n-1}$$
   适用：间隔以月为单位且相等。前提假设：相邻时点间均匀变动（结果近似值）。

4. 间断时点·间隔不等 → 两两平均加权法
   ①相邻两时点求平均 ②×各自间隔长度 ③求和÷总间隔
   适用：间隔以月为单位但不相等。

async function callLLM(userMsg) {
  const apiKey = getApiKey();
  if (!apiKey) return null;
  
  CHAT_HISTORY.push({ role: 'user', content: userMsg });
  // Keep last 10 messages
  if (CHAT_HISTORY.length > 11) CHAT_HISTORY = CHAT_HISTORY.slice(-11);
  
  const messages = [
    { role: 'system', content: SYSTEM_PROMPT },
    ...CHAT_HISTORY
  ];
  
  try {
    const resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + apiKey
      },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: messages,
        max_tokens: 400,
        temperature: 0.7
      })
    });
    
    if (!resp.ok) {
      if (resp.status === 401) {
        localStorage.removeItem('xiaotong_apikey');
        updateModelLabel();
        return '⚠️ API Key无效，已切换回FAQ模式。点击聊天标题旁的⚙重新设置。';
      }
      return null;
    }
    
    const data = await resp.json();
    let reply = data.choices[0].message.content;
    CHAT_HISTORY.push({ role: 'assistant', content: reply });
    return reply;
  } catch(e) {
    console.error('LLM error:', e);
    return null; // fall back to FAQ
  }
}

function sendMessage() {
  const input = document.getElementById('chatInput');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  
  // 预激活语音引擎：在用户点击时同步触发，手机浏览器后续才能自动播放
  if (isVoiceOn() && 'speechSynthesis' in window) {
    speechSynthesis.speak(new SpeechSynthesisUtterance(''));
  }
  
  const msgs = document.getElementById('chatMessages');
  if (!msgs) return;
  
  // Add user message
  msgs.innerHTML += `<div class="chat-msg user">${escapeHtml(text)}</div>`;
  
  // Add typing indicator
  const typingId = 'typing-' + Date.now();
  msgs.innerHTML += `<div class="chat-typing" id="${typingId}"><span></span><span></span><span></span></div>`;
  msgs.scrollTop = msgs.scrollHeight;
  
  // Try LLM first, fall back to FAQ
  (async () => {
    let reply = null;
    
    if (getApiKey()) {
      reply = await callLLM(text);
    }
    
    if (!reply) {
      // FAQ fallback
      reply = findReply(text) || getFallbackReply();
    }
    
    const typing = document.getElementById(typingId);
    if (typing) typing.remove();
    
    // Add bot message with speak button
    var msgId = 'msg-' + Date.now();
    window._replyCache = window._replyCache || {};
    window._replyCache[msgId] = reply;
    msgs.innerHTML += `<div class="chat-msg bot" id="${msgId}">${renderMarkdown(reply)}<span class="msg-speak-btn" onclick="event.stopPropagation();var r=window._replyCache['${msgId}'];if(r)speakCute(r,false)" title="点击播放语音">🔊</span></div>`;
    msgs.scrollTop = msgs.scrollHeight;
    
    // Auto-TTS (primed during user click above)
    if (isVoiceOn() && reply.length < 250) {
      speakCute(reply, false);
    }
  })();
}

// ==================== INLINE MARKDOWN RENDERER ====================
function renderMarkdown(text) {
  //   // Simple fallback: if text has LaTeX commands but no $$ wrapping,
  // wrap any line containing \ followed by LaTeX command in $$
  var bs = String.fromCharCode(92); // literal backslash
  var latexCmds = ['frac','sum','bar','cdot','int','sqrt','alpha','beta','gamma','delta','infty','partial','times','div','pm','mp','rightarrow','leftarrow','uparrow','downarrow','langle','rangle','ldots','cdots','vdots','ddots','forall','exists','in','notin','subseteq','supseteq'];
  var hasBareLatex = false;
  for (var c of latexCmds) {
    if (text.indexOf(bs + c) >= 0) { hasBareLatex = true; break; }
  }
  if (hasBareLatex && text.indexOf('$$') < 0) {
    // No $$ found but LaTeX commands present -> wrap everything
    text = '$$' + text + '$$';
  }
  
  // Protect math first
  const mathBlocks = [];
  let t = text;
  t = t.replace(/\$\$([\s\S]*?)\$\$/g, (m, f) => {
    mathBlocks.push({type:'block', content: f.trim()});
    return '\u0000MB' + (mathBlocks.length-1) + '\u0000';
  });
  t = t.replace(/\$([^\$]+?)\$/g, (m, f) => {
    mathBlocks.push({type:'inline', content: f.trim()});
    return '\u0000MI' + (mathBlocks.length-1) + '\u0000';
  });
  
  // Escape HTML
  t = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  
  t = t.replace(/\u0000MB(\d+)\u0000/g, (m,i) => renderMath(mathBlocks[+i].content, true));
  t = t.replace(/\u0000MI(\d+)\u0000/g, (m,i) => renderMath(mathBlocks[+i].content, false));

  // Bold **text**
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic *text* (but not **)
  t = t.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
  // Inline code `text`
  t = t.replace(/`(.+?)`/g, '<code>$1</code>');
  // Headers
  t = t.replace(/^### (.+)$/gm, '<h4>$1</h4>');
  t = t.replace(/^## (.+)$/gm, '<h3>$1</h3>');
  // Lists (before newline handling)
  t = t.replace(/^[*-] (.+)$/gm, '<li>$1</li>');
  t = t.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
  // Remove <br> inside lists
  t = t.replace(/<ul>([\s\S]*?)<\/ul>/g, (m, inner) => '<ul>' + inner.replace(/<br>/g, '') + '</ul>');
  // Ordered lists
  t = t.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  // Blockquote
  t = t.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  // Double newline = paragraph
  t = t.replace(/\n\n/g, '</p><p>');
  // Single newline = <br>
  t = t.replace(/\n/g, '<br>');
  // Wrap in paragraph
  if (!t.startsWith('<')) t = '<p>' + t + '</p>';
  // Clean empty paragraphs
  t = t.replace(/<p><\/p>/g, '');
  // Fix nested <p> in lists
  t = t.replace(/<p>(<[ou]l>)/g, '$1');
  t = t.replace(/(<\/[ou]l>)<\/p>/g, '$1');
  
  return t;
}

function renderMath(formula, displayMode) {
  if (typeof katex === 'undefined') {
    var f = formula.replace(/\\\\/g,'\\');
    return displayMode ? '<p style="color:#a29bfe;font-style:italic;text-align:center;padding:8px 0;">' + f + '</p>' : '<span style="color:#a29bfe;font-style:italic;">' + f + '</span>';
  }
  try {
    return katex.renderToString(formula, {displayMode, throwOnError: false, trust: true});
  } catch(e) {
    return displayMode ? '<p><code>' + formula + '</code></p>' : '<code>' + formula + '</code>';
  }
}
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
